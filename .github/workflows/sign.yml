name: Right Forum Auto Sign-in

on:
  schedule:
    # 每天 00:30 运行（北京时间）
    - cron: '30 16 * * *'  # UTC 时间，对应北京时间 00:30
  workflow_dispatch:  # 手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run sign script
      env:
        COOKIE_RIGHT_FORUM: ${{ secrets.COOKIE_RIGHT_FORUM }}
        SIGN_MAX_DELAY: ${{ secrets.SIGN_MAX_DELAY || 0 }}
        PUSH_ENABLED: ${{ secrets.PUSH_ENABLED || true }}
        WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN || '' }}
        WXPUSHER_UID: ${{ secrets.WXPUSHER_UID || '' }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN || '' }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID || '' }}
        LARK_TOKEN: ${{ secrets.LARK_TOKEN || '' }}
        RIGHT_FORUM_URL: ${{ secrets.RIGHT_FORUM_URL || 'https://www.right.com.cn/forum' }}
      run: python sign.py

    - name: Summary
      if: always()
      run: |
        echo "Sign-in task completed. Check the logs above for details."
